<footer class="glass-card mt-5 mx-3 mb-3 text-center py-4" style="border-radius: 24px;">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-4 text-md-start mb-3 mb-md-0">
                <h5 class="fw-bold mb-0" style="color: var(--primary-color);">Mon Portfolio</h5>
            </div>
            
            <div class="col-md-4 mb-3 mb-md-0">
                <p class="mb-0 text-muted">&copy; {{ currentYear }} Tous droits réservés.</p>
            </div>
            
            <div class="col-md-4 text-md-end">
                <div class="social-links">
                    <a *ngFor="let link of socialLinks"
                       [href]="link.url"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="text-dark me-3 magnetic"
                       [attr.aria-label]="link.label">
                        <i [class]="link.icon"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</footer>
